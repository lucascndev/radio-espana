<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Escucha emisoras de radio españolas en directo. Interfaz sencilla y accesible.">
  <meta name="theme-color" content="#c60b1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Radio España">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23c60b1e"/><rect y="25" width="100" height="50" fill="%23ffc400"/><rect x="20" y="35" width="60" height="40" rx="6" fill="%231a1a1a"/><line x1="30" y1="35" x2="30" y2="10" stroke="%231a1a1a" stroke-width="5" stroke-linecap="round"/><circle cx="30" cy="10" r="4" fill="%231a1a1a"/><line x1="30" y1="45" x2="45" y2="45" stroke="%23ffc400" stroke-width="3" stroke-linecap="round"/><line x1="30" y1="53" x2="45" y2="53" stroke="%23ffc400" stroke-width="3" stroke-linecap="round"/><line x1="30" y1="61" x2="45" y2="61" stroke="%23ffc400" stroke-width="3" stroke-linecap="round"/><circle cx="65" cy="53" r="10" fill="%23c60b1e"/><circle cx="65" cy="53" r="3" fill="%23ffffff"/></svg>'>
  <title>Radio España</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

  <header class="app-header" role="banner">
    <div class="header-inner">
      <div class="header-titles">
        <div id="digital-clock" class="digital-clock" aria-hidden="true">--:--</div>
        <h1>Radio en Directo</h1>
        <p id="header-subtitle">Pulsa una emisora para escuchar</p>
      </div>
      <div id="match-ticker" class="match-ticker" aria-live="polite"></div>
    </div>
  </header>

  <div id="offline-banner" class="offline-banner" role="alert" aria-live="assertive">
    No hay conexion a Internet
  </div>

  <main class="station-list" role="main" aria-label="Lista de emisoras">
    <!-- Station buttons are generated by JavaScript -->
  </main>

  <audio id="audio-player" preload="none"></audio>

  <div class="bottom-section">
    <div class="volume-container" aria-label="Control de volumen">
      <button id="mute-btn" class="mute-btn" aria-label="Silenciar"></button>
      <div class="volume-controls">
        <button id="vol-down-btn" class="vol-btn" aria-label="Bajar volumen">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <span id="vol-indicator" class="vol-indicator" aria-live="polite">100%</span>
        <button id="vol-up-btn" class="vol-btn" aria-label="Subir volumen">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
    </div>

    <button id="stop-btn" class="stop-btn disabled" type="button" aria-label="Parar la radio" disabled>
      PARAR RADIO
    </button>
  </div>

  <div id="error-modal" class="error-modal" role="dialog" aria-modal="true" aria-labelledby="error-msg">
    <div class="error-dialog">
      <div id="error-msg" class="error-message">No se pudo conectar.</div>
      <button id="retry-btn" class="retry-btn">REINTENTAR</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
